# train_baseline.yaml — Baseline (无 LCA) 云端训练配置
#
# 继承 lead_subset.yaml (COCO 7类子集 + KITTI 道路场景)。
# 锁死 model.lca.enabled=false。
# 训练策略与 train_lca.yaml 完全一致, 保证消融对照单变量原则。

inherit: "lead_subset.yaml"

experiment:
  name: "baseline_train"
  tag:   "baseline_no_lca"
  stage: "M5"
  rq: ["RQ1", "RQ2"]
  notes: "Baseline (无LCA), COCO 7类均衡子集+KITTI, 两阶段 LLRD + EMA"

# ─── 锁死 LCA 为 false（消融对照基线） ──────────────────
model:
  lca:
    enabled: false

# ─── 训练超参（与 train_lca.yaml 一致） ──────────────────
training:
  amp: true
  ema: true
  ema_decay: 0.9998
  grad_clip_norm: 5.0           # [CHANGED] 10.0→5.0
  grad_scaler_init_scale: 2048.0 # [NEW]
  batch_size: 64
  num_workers: 16
  prefetch_factor: 8

stage1_freeze_backbone:
  enabled: true
  max_epochs: 5
  loss_change_threshold: 0.05

stage2_joint_training:
  epochs: 180               # [CHANGED] 120→180 (mAP@120仍在上升, 预留收敛空间)
  early_stopping: false
  patience: 0

learning_rate:
  head: 0.003            # [CHANGED] LR Range Test: min_loss/10
  lca: 0.0024
  backbone_last: 0.0009
  backbone_middle: 0.0003
  backbone_first: 0.00009

optimizer:
  name: sgd
  type: SGD
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  weight_decay_exclude: ["bn", "bias"]

lr_scheduler:
  name: cosine
  warmup_iters: 500
  warmup_start_factor: 0.01

checkpoint:
  save_best_map: true
  save_last: true
  restore_best_at_end: true
