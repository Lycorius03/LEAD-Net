# baseline_ssd.yaml — M1 Baseline 配置
# 模型：MobileNetV3-Small Backbone + SSD-Lite Detection Head，**不含 LCA**
# 对应 RQ：RQ1、RQ2 的对照基线（消融实验的"无注意力"版本）
# 锁死约束：use_lca 必须为 false（M1 阶段），不得修改为 true 进入 M2 后再改

# 继承 default.yaml 公共字段；本文件只覆盖/补充训练相关超参。
# 注：lead_net/utils/config.py 支持深度合并 default.yaml 作为基础。

inherit: "default.yaml"

# ---------- 类别映射：COCO 2017 全 80 类 ----------
# 注意：lead_subset.yaml 有自己的 7 类映射，与此无关
