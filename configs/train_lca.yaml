# train_lca.yaml — 云端训练配置（+LCA, RTX 5090 32GB）
#
# 继承 lca_ssd.yaml (M2 消融配置)，覆盖训练超参。
# 训练策略与 train_baseline.yaml 完全一致，保证消融对照单变量原则。

inherit: "lca_ssd.yaml"

experiment:
  name: "lca_train"
  tag:   "baseline_plus_lca"
  stage: "M5"
  rq: ["RQ1", "RQ2"]
  notes: "云端 +LCA 正式训练，LLRD + EMA + Auto Batch，除 LCA 开关外与 baseline 一致"

# ---------- 训练超参 ----------
training:
  amp: true
  ema: true
  ema_decay: 0.9998
  grad_clip_norm: 10.0
  batch_size: 256             # RTX 5090 32GB 直接使用 256

stage1_freeze_backbone:
  enabled: true
  max_epochs: 5
  loss_change_threshold: 0.05

stage2_joint_training:
  epochs: 120
  early_stopping: false

learning_rate:
  head: 0.001
  lca: 0.0008
  backbone_last: 0.0003
  backbone_middle: 0.0001
  backbone_first: 0.00003

optimizer:
  name: sgd
  type: SGD
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  weight_decay_exclude: ["bn", "bias"]

lr_scheduler:
  name: cosine
  warmup_iters: 1000
  warmup_start_factor: 0.001

checkpoint:
  save_best_map: true
  save_last: true
  restore_best_at_end: true
