# train_lca.yaml — +LCA 云端训练配置
#
# 继承 lead_subset.yaml (COCO 7类子集 + KITTI 道路场景)。
# 训练策略：两阶段 LLRD + EMA + Cosine + Early Stopping。
# 消融对照：train_baseline.yaml (model.lca.enabled=false, 其余一致)。

inherit: "lead_subset.yaml"

experiment:
  name: "lca_train"
  tag:   "baseline_plus_lca"
  stage: "M5"
  rq: ["RQ1", "RQ2"]
  notes: "+LCA, COCO 7类均衡子集+KITTI, 两阶段 LLRD + EMA"

# ─── 覆盖模型：开启 LCA ─────────────────────────────────
model:
  lca:
    enabled: true              # 实验组：开启 LCA

# ─── 训练超参（覆盖 lead_subset 默认值） ──────────────────
training:
  amp: true
  ema: true
  ema_decay: 0.9998
  grad_clip_norm: 10.0
  batch_size: 96              # 12K 数据集, 3 类, RTX 5090 32GB 轻松
  num_workers: 8
  prefetch_factor: 4

stage1_freeze_backbone:
  enabled: true
  max_epochs: 5
  loss_change_threshold: 0.05

stage2_joint_training:
  epochs: 120
  early_stopping: false       # 消融实验关早停, 保证对照组 epoch 数一致
  patience: 0

learning_rate:
  head: 0.001
  lca: 0.0008
  backbone_last: 0.0003
  backbone_middle: 0.0001
  backbone_first: 0.00003

optimizer:
  name: sgd
  type: SGD
  momentum: 0.9
  nesterov: true
  weight_decay: 0.0005
  weight_decay_exclude: ["bn", "bias"]

lr_scheduler:
  name: cosine
  warmup_iters: 1000
  warmup_start_factor: 0.001

checkpoint:
  save_best_map: true
  save_last: true
  restore_best_at_end: true
